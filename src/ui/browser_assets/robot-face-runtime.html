<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oreo Face Runtime</title>
  <style>
    :root {
      --bg: #000000;
      --ink: #e8fbff;
      --muted: rgba(213, 247, 255, 0.74);
      --accent: #48f8ff;
      --panel: rgba(6, 14, 22, 0.76);
      --panel-strong: rgba(7, 18, 27, 0.92);
      --line: rgba(72, 248, 255, 0.18);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      --sans: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
    }

    body {
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 18%, rgba(72, 248, 255, 0.09), transparent 24%),
        radial-gradient(circle at 50% 85%, rgba(255, 179, 103, 0.04), transparent 34%),
        #000;
    }

    body.display-blanked {
      background: #000;
    }

    .face-stage,
    .overlay-stage {
      position: absolute;
      inset: 0;
    }

    .face-stage {
      z-index: 1;
    }

    .overlay-stage {
      z-index: 2;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .top-bar {
      position: absolute;
      top: 34px;
      left: 54px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .status-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(155, 109, 255, 0.36);
      background: rgba(28, 16, 55, 0.76);
      box-shadow: var(--shadow);
      color: var(--ink);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(14px);
    }

    .animation-pill {
      color: var(--ink);
    }

    .text-overlay {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      width: min(84vw, 760px);
      padding: 16px 22px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(7, 18, 27, 0.80), rgba(5, 12, 18, 0.92));
      box-shadow: var(--shadow);
      color: var(--ink);
      font-size: clamp(1rem, 2vw, 1.36rem);
      line-height: 1.35;
      text-align: center;
      text-wrap: balance;
      backdrop-filter: blur(18px);
    }

    .content-overlay {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: grid;
      justify-items: center;
    }

    .content-card {
      width: min(88vw, 920px);
      padding: 22px 24px 20px;
      border-radius: 28px;
      border: 1px solid rgba(72, 248, 255, 0.20);
      background: linear-gradient(180deg, rgba(10, 20, 29, 0.82), rgba(6, 12, 18, 0.94));
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .content-title {
      margin: 0;
      font-size: clamp(1.1rem, 2.6vw, 1.8rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .content-body {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--mono);
    }

    .icon-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .icon-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      min-height: 42px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(72, 248, 255, 0.22);
      background: rgba(72, 248, 255, 0.08);
      color: var(--ink);
      font-size: 1.15rem;
      line-height: 1;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 800px) {
      .top-bar {
        top: 18px;
        left: 24px;
        right: 6px;
      }

      .status-pill {
        min-height: 28px;
        padding: 6px 10px;
        font-size: 0.72rem;
      }

      .status-group {
        gap: 7px;
      }

      .text-overlay {
        bottom: 14px;
        width: min(92vw, 92vw);
        padding: 14px 16px;
      }

      .content-overlay {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }

      .content-card {
        width: 100%;
        padding: 16px 16px 14px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="face-stage">
    <canvas id="faceCanvas" aria-label="Oreo robot face"></canvas>
  </div>
  <div class="overlay-stage">
    <div class="top-bar">
      <div class="status-group">
        <div class="status-pill" id="bridgeStatus">Connecting</div>
        <div class="status-pill animation-pill" id="animationStatus" hidden>Animation</div>
      </div>
    </div>
    <div class="content-overlay" id="contentOverlay" hidden>
      <section class="content-card" aria-live="polite">
        <h1 class="content-title" id="contentTitle"></h1>
        <p class="content-body" id="contentBody"></p>
        <div class="icon-strip" id="iconStrip"></div>
      </section>
    </div>
    <div class="text-overlay" id="textOverlay" hidden aria-live="polite"></div>
  </div>
  <script type="module" src="./robot-face/runtime-app.js"></script>
</body>
</html>
